name: Market Telegram Alerts

on:
  schedule:
    # Runs 2 minutes before the desired India times:
    # 10:58 IST, 13:58 IST, and 15:33 IST, Monday-Friday.
    - cron: "28 5 * * 1-5"
    - cron: "28 8 * * 1-5"
    - cron: "3 10 * * 1-5"
  workflow_dispatch:

jobs:
  send-market-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore Telegram update state
        uses: actions/cache/restore@v4
        with:
          path: .telegram_state.json
          key: telegram-state-${{ github.run_id }}
          restore-keys: |
            telegram-state-

      - name: Send Telegram market update
        run: python index_whatsapp_alert.py

      - name: Save Telegram update state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .telegram_state.json
          key: telegram-state-${{ github.run_id }}
